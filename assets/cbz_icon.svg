<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6D5BFF"/>
      <stop offset="0.5" stop-color="#5136E0"/>
      <stop offset="1" stop-color="#2B1B8F"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="0.5" cy="0.28" r="0.9">
      <stop offset="0" stop-color="#9D8CFF" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#9D8CFF" stop-opacity="0"/>
    </radialGradient>
    <!-- Gloss sweep -->
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.04"/>
    </linearGradient>
    <!-- Page gradient -->
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E9E9F4"/>
    </linearGradient>
    <!-- Amber arrow gradient -->
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFD166"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="amberDeep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#D97706"/>
    </linearGradient>
    <!-- Zipper metal -->
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F3F4F6"/>
      <stop offset="0.5" stop-color="#C7CBD4"/>
      <stop offset="1" stop-color="#8E95A3"/>
    </linearGradient>
    <!-- Drop shadow for pages -->
    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#12083F" flood-opacity="0.45"/>
    </filter>
    <filter id="arrowShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#12083F" flood-opacity="0.5"/>
    </filter>
    <clipPath id="squircle">
      <rect x="32" y="32" width="960" height="960" rx="224"/>
    </clipPath>
  </defs>

  <!-- Icon body -->
  <g clip-path="url(#squircle)">
    <rect x="32" y="32" width="960" height="960" fill="url(#bg)"/>
    <rect x="32" y="32" width="960" height="960" fill="url(#bgGlow)"/>

    <!-- faint halftone comic dots in background -->
    <g fill="#FFFFFF" opacity="0.06">
      <circle cx="140" cy="820" r="14"/><circle cx="200" cy="860" r="11"/><circle cx="120" cy="900" r="9"/>
      <circle cx="900" cy="180" r="14"/><circle cx="850" cy="130" r="10"/><circle cx="930" cy="110" r="8"/>
      <circle cx="880" cy="850" r="12"/><circle cx="930" cy="800" r="9"/>
      <circle cx="130" cy="170" r="12"/><circle cx="180" cy="120" r="9"/>
    </g>

    <!-- LEFT PAGE (tilted) -->
    <g transform="rotate(-9 380 520)" filter="url(#softShadow)">
      <rect x="230" y="300" width="300" height="420" rx="30" fill="url(#page)"/>
      <rect x="230" y="300" width="300" height="420" rx="30" fill="none" stroke="#FFFFFF" stroke-opacity="0.85" stroke-width="6"/>
      <!-- comic panels -->
      <g>
        <rect x="262" y="336" width="150" height="120" rx="10" fill="#5B6BFA"/>
        <rect x="424" y="336" width="74" height="120" rx="10" fill="#C3C9F5"/>
        <rect x="262" y="470" width="236" height="90" rx="10" fill="#8B94F7"/>
        <rect x="262" y="574" width="110" height="112" rx="10" fill="#C3C9F5"/>
        <rect x="384" y="574" width="114" height="112" rx="10" fill="#5B6BFA"/>
      </g>
      <!-- page gloss -->
      <path d="M230 330 a30 30 0 0 1 30 -30 h240 a30 30 0 0 1 30 30 v120 q-150 46 -300 0 z" fill="#FFFFFF" opacity="0.28"/>
    </g>

    <!-- RIGHT PAGE (tilted, amber-accent) -->
    <g transform="rotate(9 646 520)" filter="url(#softShadow)">
      <rect x="496" y="300" width="300" height="420" rx="30" fill="url(#page)"/>
      <rect x="496" y="300" width="300" height="420" rx="30" fill="none" stroke="#FFFFFF" stroke-opacity="0.85" stroke-width="6"/>
      <g>
        <rect x="528" y="336" width="236" height="132" rx="10" fill="#FFB84D"/>
        <rect x="528" y="482" width="110" height="100" rx="10" fill="#FFDFA8"/>
        <rect x="650" y="482" width="114" height="100" rx="10" fill="#FF9E2C"/>
        <rect x="528" y="596" width="236" height="90" rx="10" fill="#FFD48A"/>
      </g>
      <path d="M496 330 a30 30 0 0 1 30 -30 h240 a30 30 0 0 1 30 30 v120 q-150 46 -300 0 z" fill="#FFFFFF" opacity="0.28"/>
      <!-- zipper pull hint (archive) -->
      <g transform="translate(740 292)">
        <rect x="-12" y="-34" width="24" height="46" rx="10" fill="url(#metal)" stroke="#6B7280" stroke-width="3"/>
        <circle cx="0" cy="-4" r="7" fill="#4B5563"/>
        <rect x="-7" y="-52" width="14" height="22" rx="6" fill="url(#metal)" stroke="#6B7280" stroke-width="3"/>
      </g>
    </g>

    <!-- SWAP ARROWS -->
    <g filter="url(#arrowShadow)">
      <!-- top arrow: left -> right -->
      <path d="M330 250 Q512 130 694 250" fill="none" stroke="url(#amber)" stroke-width="52" stroke-linecap="round"/>
      <path d="M652 168 L748 262 L616 288 Z" fill="url(#amber)"/>
      <!-- bottom arrow: right -> left -->
      <path d="M694 774 Q512 894 330 774" fill="none" stroke="url(#amberDeep)" stroke-width="52" stroke-linecap="round"/>
      <path d="M372 856 L276 762 L408 736 Z" fill="url(#amberDeep)"/>
    </g>
    <!-- arrow gloss highlights -->
    <path d="M345 238 Q512 130 679 238" fill="none" stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="14" stroke-linecap="round"/>
    <path d="M679 786 Q512 894 345 786" fill="none" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="14" stroke-linecap="round"/>

    <!-- Glossy sweep over top half -->
    <path d="M32 32 h960 v420 q-480 150 -960 0 z" fill="url(#gloss)"/>

    <!-- inner rim light + bottom shade -->
    <rect x="41" y="41" width="942" height="942" rx="215" fill="none" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="6"/>
    <rect x="36" y="36" width="952" height="952" rx="220" fill="none" stroke="#1A0F5C" stroke-opacity="0.45" stroke-width="8"/>
  </g>
</svg>
